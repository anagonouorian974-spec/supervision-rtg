<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuration Système — Supervision RTG</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:       #050811;
    --bg-card:       #0f192b;
    --bg-card2:      #14223a;
    --border:        #1b3254;
    --border-hi:     #284e82;
    --blue-tech:     #00b0ff;
    --green-ok:      #00e676;
    --red-alarm:     #ff1744;
    --orange:        #ff9100;
    --text-primary:  #e3f2fd;
    --text-sec:      #789dc5;
    --text-dim:      #436288;
    --mono:          'Share Tech Mono', monospace;
    --head:          'Orbitron', sans-serif;
    --body:          'Rajdhani', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-deep); color: var(--text-primary); font-family: var(--body); font-size: 15px; min-height: 100vh;
    background-image: radial-gradient(ellipse 70% 40% at 50% 0%, #091d36 0%, transparent 70%), repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(27,50,84,0.15) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(27,50,84,0.15) 40px);
  }

  header {
    background: linear-gradient(90deg, #03060c 0%, #0a1729 50%, #03060c 100%); border-bottom: 2px solid var(--border-hi); padding: 0 24px; height: 70px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .header-title h1 { font-family: var(--head); font-size: 18px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; }
  .header-title span { color: var(--blue-tech); }
  
  .btn-back { background: linear-gradient(135deg, #00b0ff, #007bb3); border: 1px solid var(--blue-tech); color: #fff; padding: 8px 16px; border-radius: 4px; font-family: var(--head); font-size: 11px; cursor: pointer; text-decoration: none; text-transform: uppercase; }

  main { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 24px; }
  
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; position: relative; }
  .card-title { font-family: var(--head); font-size: 12px; letter-spacing: .15em; color: var(--text-sec); text-transform: uppercase; margin-bottom: 20px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  
  .field-group { display: flex; flex-direction: column; gap: 6px; background: var(--bg-card2); border: 1px solid var(--border); padding: 12px 16px; border-radius: 6px; }
  .field-group label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }
  .field-group input { background: transparent; border: none; outline: none; color: #fff; font-family: var(--body); font-size: 15px; width: 100%; border-bottom: 1px dashed transparent; }
  .field-group input:focus { border-bottom-color: var(--blue-tech); }
  .field-group input[type="date"] { font-family: var(--mono); color: var(--blue-tech); }

  .btn-save-main { background: linear-gradient(135deg, #00b0ff, #005b9f); border: 1px solid var(--blue-tech); color: #fff; padding: 12px; border-radius: 6px; font-family: var(--head); font-size: 11px; text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 10px; }
  
  /* WHATSAPP RECIPIENTS FORM */
  .wa-form-row { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr auto; gap: 10px; margin-bottom: 20px; }
  .wa-input { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; color: #fff; font-family: var(--body); font-size: 14px; }
  .wa-input:focus { outline: none; border-color: var(--blue-tech); }
  .wa-input.mono { font-family: var(--mono); }
  .btn-add-wa { background: rgba(0,230,118,0.1); border: 1px solid var(--green-ok); color: var(--green-ok); padding: 0 20px; border-radius: 6px; font-family: var(--head); font-size: 11px; cursor: pointer; text-transform: uppercase; }

  .wa-list { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; }
  .wa-contact-item { background: var(--bg-card2); border: 1px solid var(--border); padding: 12px 16px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
  .contact-details span { margin-right: 20px; }
  .btn-del { background: transparent; border: 1px solid var(--red-alarm); color: var(--red-alarm); padding: 4px 10px; border-radius: 4px; font-family: var(--mono); font-size: 11px; cursor: pointer; }
  .btn-del:hover { background: var(--red-alarm); color: #fff; }
  
  .btn-danger-clear { background: transparent; border: none; color: var(--text-dim); text-decoration: underline; font-family: var(--mono); font-size: 12px; cursor: pointer; margin-top: 10px; float: right;}
  .btn-danger-clear:hover { color: var(--red-alarm); }
  /* CODE CORRECTIF POUR RENDRE LA CONFIGURATION RESPONSIVE */
  @media (max-width: 992px) {
    main {
      grid-template-columns: 1fr; /* Aligne le formulaire et la liste des contacts l'un en dessous de l'autre */
      padding: 0 10px;
      margin: 12px auto;
    }
    header {
      height: auto;
      padding: 15px;
      flex-direction: column;
      gap: 10px;
      text-align: center;
    }
    .header-right {
      width: 100%;
      justify-content: center;
    }
    .config-grid {
      grid-template-columns: 1fr; /* Aligne les champs de saisie verticalement sur smartphone */
    }
    .form-group button {
      width: 100%; /* Rend les boutons d'action plus faciles à cliquer sur mobile */
    }
    .contact-item {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    .contact-item button {
      align-self: flex-end;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Panneau d'Administration — <span>Configuration RTG & IoT</span></h1>
  </div>
  <a href="index.html" class="btn-back">◀ Retour au Dashboard</a>
</header>

<main>
  
  <div class="card">
    <div class="card-title">1. Paramètres de la Machine & Calendrier d'Intervention</div>
    
    <div class="grid-2">
      <div class="field-group"><label>Identifiant du RTG</label><input type="text" id="cfg-id" value="RTG-07"></div>
      <div class="field-group"><label>Description de l'Organe Spécifique</label><input type="text" id="cfg-desc" value="Frein de Translation — Moteur Principal"></div>
    </div>

    <div class="grid-2">
      <div class="field-group"><label>Jour Prévu d'Intervention</label><input type="date" id="cfg-date"></div>
      <div class="field-group"><label>Technicien en Charge</label><input type="text" id="cfg-agent" value="M. BENALI"></div>
    </div>

    <div class="field-group" style="margin-bottom: 16px;"><label>Rapport Technique de l'Atelier</label><input type="text" id="cfg-report" value="Écart d'entrefer ajusté, aimant permanent repositionné"></div>

    <button class="btn-save-main" onclick="saveMainConfiguration()">Mettre à jour l'Infrastructure</button>
  </div>

  <div class="card">
    <div class="card-title">2. Registre de Routage Multi-Destinataires WhatsApp (CallMeBot)</div>
    
    <div class="wa-form-row">
      <input type="text" id="new-name" class="wa-input" placeholder="Nom de l'Ingénieur/Technicien">
      <input type="text" id="new-phone" class="wa-input mono" placeholder="N° de Téléphone (ex: +22177...)">
      <input type="text" id="new-key" class="wa-input mono" placeholder="Clé API CallMeBot">
      <button class="btn-add-wa" onclick="addNewContact()">Ajouter</button>
    </div>

    <div class="wa-list" id="contacts-container"></div>
    
    <button class="btn-danger-clear" onclick="clearSystemHistory()">Purger l'historique de l'index</button>
  </div>

</main>

<script>
// INITIALISATION DE LA CONFIGURATION CLOUD FIREBASE COMPLÈTE
const firebaseConfig = {
  apiKey: "eUJSjyx1W95zjmkqAL8PGir4rGWQUMuxJDucYIP4",
  authDomain: "supervision-rtg-default-rtdb.firebaseapp.com",
  databaseURL: "https://supervision-rtg-default-rtdb.firebaseio.com/",
  projectId: "supervision-rtg-default-rtdb",
  storageBucket: "supervision-rtg-default-rtdb.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Chargement initial depuis Firebase
database.ref('/rtg_config').once('value').then((snapshot) => {
  const cfg = snapshot.val() || {};
  document.getElementById('cfg-rtg-id').value = cfg.rtg_id || "RTG-07";
  document.getElementById('cfg-rtg-desc').value = cfg.rtg_desc || "Frein de Translation — Moteur Principal";
  document.getElementById('cfg-maint-date').value = cfg.maint_date || "";
  document.getElementById('cfg-maint-agent').value = cfg.maint_agent || "Non assigné";
  document.getElementById('cfg-maint-report').value = cfg.maint_report || "";
});

// Écoute continue de la liste des contacts sur Firebase
database.ref('/rtg_contacts').on('value', (snapshot) => {
  const container = document.getElementById('contacts-list-container');
  container.innerHTML = "";
  const data = snapshot.val();
  
  if (data) {
    Object.keys(data).forEach(id => {
      const contact = data[id];
      container.innerHTML += `
        <div class="contact-item">
          <div>
            <strong>${contact.name}</strong><br>
            <span style="font-family:var(--mono); font-size:12px; color:var(--text-sec)">${contact.phone} (Clé: ${contact.key})</span>
          </div>
          <button onclick="deleteContact('${id}')" style="background:rgba(255,23,68,0.2); border-color:var(--red-alarm); color:var(--red-alarm); padding:4px 8px; font-size:11px;">SUPPRIMER</button>
        </div>
      `;
    });
  } else {
    container.innerHTML = `<div style="color:var(--text-dim); font-size:13px; text-align:center;">Aucun contact enregistré sur le Cloud.</div>`;
  }
});

// Enregistrer la configuration générale sur Firebase
function saveGeneralConfig() {
  const configData = {
    rtg_id: document.getElementById('cfg-rtg-id').value,
    rtg_desc: document.getElementById('cfg-rtg-desc').value,
    maint_date: document.getElementById('cfg-maint-date').value,
    maint_agent: document.getElementById('cfg-maint-agent').value,
    maint_report: document.getElementById('cfg-maint-report').value
  };

  database.ref('/rtg_config').set(configData)
    .then(() => alert("Configuration générale synchronisée dans le Cloud !"))
    .catch(err => alert("Erreur de synchronisation : " + err.message));
}

// Ajouter un contact sur Firebase
function addContact() {
  const name = document.getElementById('wa-name').value.trim();
  const phone = document.getElementById('wa-phone').value.trim();
  const key = document.getElementById('wa-key').value.trim();

  if(!name || !phone || !key) {
    alert("Veuillez remplir tous les champs du contact.");
    return;
  }

  const newContactRef = database.ref('/rtg_contacts').push();
  newContactRef.set({ name, phone, key })
    .then(() => {
      document.getElementById('wa-name').value = "";
      document.getElementById('wa-phone').value = "";
      document.getElementById('wa-key').value = "";
    });
}

// Supprimer un contact sur Firebase
function deleteContact(id) {
  if(confirm("Supprimer ce contact du réseau Cloud ?")) {
    database.ref(`/rtg_contacts/${id}`).remove();
  }
}
</script>
</body>
</html>
